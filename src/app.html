<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1b1813" />
		<meta
			name="description"
			content="Southwest Acoustics inventory — shop floor source of truth."
		/>

		<!-- Brand fonts. Preconnect to Google so DNS + TLS happens in parallel
		     with HTML parse. Fraunces is the workshop-classical serif used for
		     display type; Inter Tight is the body; JetBrains Mono is for SKUs
		     and small mono labels. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
		/>

		<title>Southwest Acoustics Inventory</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
