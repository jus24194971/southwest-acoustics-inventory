<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="Southwest Acoustics">
  <defs>
    <linearGradient id="swaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23201a"/>
      <stop offset="1" stop-color="#100e0a"/>
    </linearGradient>
    <linearGradient id="swaGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d79a"/>
      <stop offset="0.5" stop-color="#cda350"/>
      <stop offset="1" stop-color="#a07c34"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="8" y="8" width="624" height="384" rx="32" fill="url(#swaBg)" stroke="#4a4233" stroke-width="2"/>
  <rect x="20" y="20" width="600" height="360" rx="24" fill="none" stroke="#cda350" stroke-width="1" opacity="0.35"/>

  <!-- SA monogram (overlapping italic serif, gold) -->
  <text x="320" y="220" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700"
        font-size="200" letter-spacing="-18" fill="url(#swaGold)">SA</text>

  <!-- Gold hairline -->
  <line x1="170" y1="262" x2="470" y2="262" stroke="#cda350" stroke-width="1.5" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="320" y="308" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="38" letter-spacing="9"
        fill="#ece4d0">SOUTHWEST ACOUSTICS</text>

  <!-- Tagline -->
  <text x="320" y="344" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="6"
        fill="#9a8c5e">GUITAR PARTS · CUSTOM BUILDS</text>
</svg>
